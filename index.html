<!-- Biaya Shopee Lain-Lain (%) -->
<div class="form-group">
    <label>Biaya Shopee Lain-Lain (%)</label>
    <div class="input-group">
        <input type="number" id="biayaLainPersen" value="" step="0.1" min="0" 
            placeholder="Contoh: 2.5" style="border-radius: 10px 0 0 10px; border-right: none;">
        <span style="border-radius: 0 10px 10px 0; border-left: none;
            min-width: 30px; background: #f7fafc; padding: 12px;
            font-weight: 600; color: #4a5568; text-align: center;">%</span>
    </div>
    <div class="info-text">Contoh: isi 2.5 untuk biaya 2.5% dari harga nett</div>
</div>

<div class="result-box" id="biayaLainPersenBox" style="background: #fef3c7; display: none;">
    <span class="result-label">📋 Biaya Lain-Lain (%)</span>
    <span class="result-value" id="biayaLainPersenText">Rp 0</span>
</div>

<!-- Biaya Shopee Lain-Lain (Rp) -->
<div class="form-group">
    <label>Biaya Shopee Lain-Lain (Rp)</label>
    <div class="input-group">
        <span>Rp</span>
        <input type="number" id="biayaLainRp" value="" step="500" placeholder="0">
    </div>
    <div class="info-text">Biaya tetap dalam Rupiah, misal biaya administrasi tambahan</div>
</div>

<div class="result-box" id="biayaLainRpBox" style="background: #fef3c7; display: none;">
    <span class="result-label">📋 Biaya Lain-Lain (Rp)</span>
    <span class="result-value" id="biayaLainRpText">Rp 0</span>
</div>
